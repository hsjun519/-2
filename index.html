<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보이스 터치 스마트 키오스크 (AI 음성 답변 안내판)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 m-0 p-0 select-none">

    <div id="app" class="flex flex-col h-screen overflow-hidden text-gray-900">
        
        <!-- 상단 네비게이션 바 -->
        <div class="bg-slate-900 text-white px-4 py-2.5 flex justify-between items-center text-xs md:text-sm shrink-0">
            <div class="flex items-center gap-2">
                <span>🤖</span>
                <span class="font-bold text-slate-300">AI 음성 질의응답 및 로컬 대기열 구동중</span>
            </div>
            <div class="bg-slate-800 p-0.5 rounded-lg flex border border-slate-700">
                <button id="btn-mode-kiosk" onclick="setAppMode('kiosk')" class="px-3 py-1 rounded-md font-bold transition-all bg-red-600 text-white">
                    키오스크 주문
                </button>
                <button id="btn-mode-kitchen" onclick="setAppMode('kitchen')" class="px-3 py-1 rounded-md font-bold transition-all text-slate-400 hover:text-white flex items-center gap-1">
                    실시간 주방보드
                    <span id="kitchen-count" class="hidden bg-red-500 text-white text-[10px] px-1.5 py-0.2 rounded-full font-black animate-bounce">0</span>
                </button>
            </div>
        </div>

        <!-- 영수증 모달 -->
        <div id="receipt-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border border-gray-100 text-center">
                <div class="text-5xl mb-3">🎉</div>
                <h3 class="text-xl font-black text-gray-800">주문 완료!</h3>
                <div class="bg-gray-50 my-4 p-4 rounded-xl border border-dashed border-gray-200">
                    <div id="receipt-number" class="text-3xl font-black text-red-600">대기번호: --번</div>
                    <div id="receipt-date" class="text-xs text-gray-400 mt-2">--</div>
                    <div class="border-t border-gray-200 my-3"></div>
                    <div id="receipt-items" class="text-left space-y-1 text-sm text-gray-700 max-h-36 overflow-y-auto"></div>
                    <div class="border-t border-gray-200 my-3"></div>
                    <div class="flex justify-between font-extrabold text-base text-gray-900">
                        <span>최종 결제 금액</span>
                        <span id="receipt-total">0원</span>
                    </div>
                </div>
                <button onclick="closeReceipt()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition-colors">
                    확인 및 닫기
                </button>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            
            <!-- 키오스크 메인 뷰 -->
            <div id="kiosk-view" class="flex-1 flex flex-col h-full overflow-hidden relative">
                <header class="bg-red-600 text-white p-4 shadow-md flex justify-between items-center z-10 flex-wrap gap-2">
                    <div class="flex items-center gap-2">
                        <span class="text-3xl">🍔</span>
                        <div>
                            <h1 class="text-xl md:text-2xl font-black tracking-tight flex items-center gap-1.5 flex-wrap">
                                인공지능 대화형 스마트 키오스크
                            </h1>
                            <p class="text-xs text-red-100 hidden sm:block">주문뿐만 아니라 키오스크에게 궁금한 점을 질문해 보세요!</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="btn-tts" onclick="toggleTts()" class="p-2 rounded-full transition-all bg-red-500 text-white hover:bg-red-400">
                            <span id="tts-icon">🔊</span>
                        </button>
                        <button id="btn-listen" onclick="toggleListening()" class="flex items-center gap-2 px-4 py-2.5 rounded-full font-bold bg-white text-red-600 hover:bg-red-50 transition-all shadow-md">
                            <span id="listening-indicator" class="relative hidden">
                                <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-red-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                            </span>
                            <span id="listen-icon">🎙️</span>
                            <span id="listen-text">음성 주문 시작</span>
                        </button>
                    </div>
                </header>

                <!-- 음성 가이드 및 질문 추천 팁 바 -->
                <div class="bg-gradient-to-r from-teal-50 to-emerald-50 px-4 py-3 border-b border-emerald-100 flex flex-col gap-1 shrink-0 text-xs md:text-sm text-teal-900 font-medium">
                    <div class="flex items-center gap-2">
                        <span>💡</span>
                        <span class="bg-teal-100 text-teal-800 px-2 py-0.5 rounded font-bold">추천 질문 (직접 말해보세요!)</span>
                        <span class="text-gray-600">"디카페인이 뭐야?", "제일 잘 나가는 메뉴 추천해줘", "화장실 어디야?"</span>
                    </div>
                </div>

                <!-- 실시간 인식 및 대화창 피드백 영역 -->
                <div id="voice-feedback-area" class="mx-4 mt-4 p-4 rounded-xl bg-white shadow-sm border border-gray-100 flex flex-col gap-2 transition-all duration-300 hidden">
                    <div id="transcript-row" class="flex items-center gap-2 text-gray-600 text-sm hidden">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-ping"></span>
                        <span class="font-semibold text-gray-500">내가 한 말:</span>
                        <span id="transcript-text" class="text-gray-900 font-bold bg-gray-50 px-3 py-1 rounded border border-gray-100"></span>
                    </div>
                    <div id="feedback-row" class="text-blue-600 font-bold text-base md:text-lg animate-fade-in flex items-start gap-1.5 hidden">
                        <span class="text-xl">🤖</span> 
                        <div class="bg-blue-50 text-blue-900 px-3 py-2 rounded-xl border border-blue-100 max-w-xl">
                            <span id="feedback-text"></span>
                        </div>
                    </div>
                </div>

                <!-- 카테고리 탭 -->
                <div id="category-tabs" class="flex gap-2 p-4 overflow-x-auto scrollbar-none shrink-0">
                    <button onclick="filterCategory('전체')" class="category-tab px-6 py-2.5 rounded-xl font-bold text-base whitespace-nowrap transition-all shadow-sm bg-red-600 text-white">전체</button>
                    <button onclick="filterCategory('버거')" class="category-tab px-6 py-2.5 rounded-xl font-bold text-base whitespace-nowrap transition-all shadow-sm bg-white text-gray-600 hover:bg-gray-100">버거</button>
                    <button onclick="filterCategory('사이드')" class="category-tab px-6 py-2.5 rounded-xl font-bold text-base whitespace-nowrap transition-all shadow-sm bg-white text-gray-600 hover:bg-gray-100">사이드</button>
                    <button onclick="filterCategory('음료')" class="category-tab px-6 py-2.5 rounded-xl font-bold text-base whitespace-nowrap transition-all shadow-sm bg-white text-gray-600 hover:bg-gray-100">음료</button>
                </div>

                <!-- 메뉴 그리드 -->
                <div class="flex-1 overflow-y-auto p-4 pt-0">
                    <div id="menu-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20"></div>
                </div>
            </div>

            <!-- 오른쪽 장바구니 -->
            <div id="sidebar-cart" class="w-full md:w-[380px] bg-white shadow-2xl flex flex-col h-[40vh] md:h-full border-t border-gray-200 md:border-t-0 md:border-l border-gray-100 z-10 overflow-hidden">
                <div class="p-4 bg-gray-50 border-b border-gray-200 flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-2">
                        <span>🛒</span>
                        <h2 class="text-base font-black text-gray-800">장바구니</h2>
                        <span id="cart-count-badge" class="bg-red-100 text-red-600 px-2.5 py-0.5 rounded-full text-xs font-bold">0개</span>
                    </div>
                    <button onclick="clearCart()" class="text-xs text-gray-400 hover:text-red-500 font-semibold flex items-center gap-1">
                        <span>🔄</span> 전체비우기
                    </button>
                </div>

                <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50/50"></div>

                <div class="p-4 bg-white border-t border-gray-200 pb-8 md:pb-4 shrink-0">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-bold text-gray-500">결제 금액</span>
                        <div class="text-right">
                            <span id="cart-total-price" class="text-xl md:text-2xl font-extrabold text-red-600">0</span>
                            <span class="text-sm font-bold text-red-600 ml-0.5">원</span>
                        </div>
                    </div>
                    <button id="btn-checkout" onclick="executeCheckout()" class="w-full py-3 rounded-xl text-base font-black flex justify-center items-center gap-2 transition-all bg-gray-200 text-gray-400 cursor-not-allowed" disabled>
                        <span>✅</span> 결제하기
                    </button>
                </div>
            </div>

            <!-- 실시간 주방 보드 -->
            <div id="kitchen-view" class="flex-1 flex flex-col p-6 overflow-y-auto bg-slate-100 hidden">
                <div class="flex justify-between items-center mb-6 shrink-0">
                    <div>
                        <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                            <span>🕒</span> 실시간 주방 조리 대기 화면
                        </h2>
                    </div>
                </div>
                <div id="kitchen-orders-container" class="flex-1"></div>
            </div>

        </div>
    </div>

    <script>
        const MENU_DATA = [
            { id: 1, category: '버거', name: '불고기버거', price: 4500, icon: '🍔', keywords: ['불고기', '불고기버거', '불고기 버거'] },
            { id: 2, category: '버거', name: '치즈버거', price: 4000, icon: '🧀', keywords: ['치즈', '치즈버거', '치즈 버거'] },
            { id: 3, category: '버거', name: '새우버거', price: 4500, icon: '🍤', keywords: ['새우', '새우버거', '새우 버거'] },
            { id: 4, category: '버거', name: '빅맥', price: 5500, icon: '🍔', keywords: ['빅맥', '빅 맥'] },
            { id: 5, category: '사이드', name: '감자튀김', price: 2000, icon: '🍟', keywords: ['감자', '감자튀김', '감튀', '포테이토'] },
            { id: 6, category: '사이드', name: '치즈스틱', price: 2500, icon: '🥖', keywords: ['치즈스틱', '치즈 스틱'] },
            { id: 7, category: '음료', name: '콜라', price: 1500, icon: '🥤', keywords: ['콜라', '코카콜라', '코카 콜라'] },
            { id: 8, category: '음료', name: '사이다', price: 1500, icon: '🥤', keywords: ['사이다', '스프라이트'] },
        ];

        // 🌟 AI 질문 답변용 미리 구성된 시나리오 데이터베이스
        const AI_QA_DATABASE = [
            {
                keywords: ['디카페인', '디 카페인', '카페인 없는'],
                answer: "디카페인은 커피에서 카페인 성분을 대부분 제거한 음료입니다. 카페인에 민감하시거나 늦은 밤에 커피를 드시고 싶을 때 추천해 드립니다!"
            },
            {
                keywords: ['추천', '제일 잘 나가', '맛있는', '인기'],
                answer: "우리 매장의 대표 메뉴는 단연 달콤 짭조름한 '불고기버거'와 바삭한 '감자튀김' 조합입니다! 시원한 콜라와 함께 드셔보세요."
            },
            {
                keywords: ['화장실', '화장실이', '어디'],
                answer: "화장실은 키오스크 뒤쪽 통로를 통해 나가셔서 건물 우측으로 돌아가시면 위치해 있습니다. 비밀번호는 따로 없습니다!"
            },
            {
                keywords: ['주차', '주차장', '차'],
                answer: "저희 매장 이용 고객님은 전용 주차장을 1시간 동안 무료로 이용하실 수 있습니다. 나가실 때 카운터에 차량 번호를 꼭 말씀해 주세요."
            }
        ];

        let cart = [];
        let orders = [];
        let activeCategory = '전체';
        let appMode = 'kiosk';
        let isListening = false;
        let isTtsMuted = false;
        let shouldRestartRecognition = false;

        let recognition = null;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isListening = true;
                updateListeningUI();
                showVoiceArea(true);
                setTranscriptText('듣고 있습니다... 무엇이든 말씀해 주세요.');
            };

            recognition.onresult = (event) => {
                const currentTranscript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                setTranscriptText(currentTranscript);
                
                if (event.results[0].isFinal) {
                    processVoiceCommand(currentTranscript);
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    setTranscriptText('마이크 접근 권한이 거부되었습니다.');
                    isListening = false;
                    shouldRestartRecognition = false;
                    updateListeningUI();
                }
            };

            recognition.onend = () => {
                isListening = false;
                updateListeningUI();
                if (shouldRestartRecognition) {
                    setTimeout(() => {
                        try { recognition.start(); } catch (e) { console.error(e); }
                    }, 300);
                } else {
                    setTimeout(() => { if(!isListening) showVoiceArea(false); }, 7000);
                }
            };
        }

        // 목소리 출력 엔진 (소리 나게 하는 핵심 기능!)
        function speakFeedback(text) {
            if (isTtsMuted) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 겹치지 않게 이전 음성 초기화
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 1.05; // 읽는 속도 (1.0이 표준)
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleTts() {
            isTtsMuted = !isTtsMuted;
            document.getElementById('tts-icon').innerText = isTtsMuted ? '🔇' : '🔊';
            showAiResponse(isTtsMuted ? '🔇 안내 음성을 껐습니다.' : '🔊 안내 음성을 켰습니다.');
        }

        function toggleListening() {
            if (!recognition) {
                alert('음성 인식을 지원하지 않는 브라우저입니다.');
                return;
            }
            if (isListening) {
                shouldRestartRecognition = false;
                recognition.stop();
            } else {
                shouldRestartRecognition = true;
                try { recognition.start(); } catch (e) { console.error(e); }
            }
        }

        function updateListeningUI() {
            const btn = document.getElementById('btn-listen');
            const text = document.getElementById('listen-text');
            const ind = document.getElementById('listening-indicator');
            if (isListening) {
                btn.className = "flex items-center gap-2 px-4 py-2.5 rounded-full font-bold bg-yellow-400 text-red-950 scale-105 border-2 border-yellow-300 shadow-yellow-400/50 transition-all";
                text.innerText = "음성인식 대기중";
                ind.classList.remove('hidden');
            } else {
                btn.className = "flex items-center gap-2 px-4 py-2.5 rounded-full font-bold bg-white text-red-600 hover:bg-red-50 transition-all shadow-md";
                text.innerText = "음성 주문 시작";
                ind.classList.add('hidden');
            }
        }

        // 음성 분석 및 처리 분기점
        function processVoiceCommand(command) {
            const cleanCommand = command.trim();

            // 1순위: 안내 질문 패킷 매칭 검사 ("디카페인이 뭐야?" 등)
            for (const qa of AI_QA_DATABASE) {
                const found = qa.keywords.some(keyword => cleanCommand.includes(keyword));
                if (found) {
                    showAiResponse(qa.answer);
                    speakFeedback(qa.answer); // 로봇이 직접 소리내어 답변함!
                    return; // 처리 완료 시 주문 로직 건너뛰고 함수 종료
                }
            }

            // 2순위: 계산 및 결제 명령어 우회 차단[cite: 1]
            if (/(결제|계산|주문\s*완료|완료해|돈\s*내|살게|살래|결재)/.test(cleanCommand)) {
                if (cart.length === 0) {
                    showAiResponse('🛒 장바구니에 상품을 먼저 담아주세요.');
                    speakFeedback('장바구니가 비어 있어 결제할 수 없습니다.');
                    return; //[cite: 1]
                }
                executeCheckout();
                return; //[cite: 1]
            }

            // 3순위: 기본 상품 추가/삭제 처리
            const isSubtraction = /(빼|취소|제거|삭제|줄여)/.test(cleanCommand);
            let matchedAny = false;
            let addedList = [];
            let removedList = [];

            MENU_DATA.forEach(item => {
                let foundKeyword = null;
                for (const keyword of item.keywords) {
                    if (cleanCommand.includes(keyword)) {
                        foundKeyword = keyword;
                        break;
                    }
                }

                if (foundKeyword) {
                    matchedAny = true;
                    const qty = parseQuantity(cleanCommand, foundKeyword);

                    if (isSubtraction) {
                        subtractFromCart(item, qty);
                        removedList.push(`${item.name} ${qty}개`);
                    } else {
                        addManyToCart(item, qty);
                        addedList.push(`${item.name} ${qty}개`);
                    }
                }
            });

            if (matchedAny) {
                if (addedList.length > 0) {
                    showAiResponse(`🛒 장바구니에 ${addedList.join(', ')}를 추가했습니다.`);
                    speakFeedback(`${addedList.join(', ')} 담았습니다.`);
                }
                if (removedList.length > 0) {
                    showAiResponse(`🗑️ 장바구니에서 ${removedList.join(', ')}를 제외했습니다.`);
                    speakFeedback(`${removedList.join(', ')} 제외했습니다.`);
                }
            } else {
                showAiResponse('🤔 말씀하신 단어를 잘 알아듣지 못했어요. 다시 한번 말씀해 주세요.');
                speakFeedback('다시 한번 말씀해 주세요.');
            }
        }

        function parseQuantity(command, keyword) {
            const keywordIdx = command.indexOf(keyword);
            if (keywordIdx === -1) return 1;
            const context = command.substring(Math.max(0, keywordIdx - 4), Math.min(command.length, keywordIdx + keyword.length + 12));
            const digitMatch = context.match(/(\d+)\s*개/);
            if (digitMatch) return parseInt(digitMatch[1], 10);
            
            const koreanNumMap = [
                { regex: /(한\s*개|하나)/, value: 1 },
                { regex: /(두\s*개|둘)/, value: 2 },
                { regex: /(세\s*개|셋)/, value: 3 }
            ];
            for (const num of koreanNumMap) {
                if (num.regex.test(context)) return num.value;
            }
            return 1;
        }

        // 장바구니 & 메뉴판 화면 렌더링 코드들
        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const filtered = activeCategory === '전체' ? MENU_DATA : MENU_DATA.filter(item => item.category === activeCategory);

            filtered.forEach(item => {
                const card = document.createElement('button');
                card.onclick = () => {
                    addManyToCart(item, 1);
                    speakFeedback(`${item.name} 1개 담았습니다.`);
                    showAiResponse(`👆 장바구니에 "${item.name}"을 담았습니다.`);
                };
                card.className = "bg-white p-5 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col items-center justify-between gap-3 border border-gray-100 hover:border-red-200 group";
                card.innerHTML = `
                    <div class="text-5xl transition-transform duration-200 group-hover:scale-110">${item.icon}</div>
                    <div class="text-center">
                        <div class="text-base font-bold text-gray-800 group-hover:text-red-600 transition-colors">${item.name}</div>
                    </div>
                    <div class="text-sm text-red-600 font-extrabold bg-red-50 w-full py-1.5 rounded-xl">
                        ${item.price.toLocaleString()}원
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const totalText = document.getElementById('cart-total-price');
            const badge = document.getElementById('cart-count-badge');
            const btnCheckout = document.getElementById('btn-checkout');
            container.innerHTML = '';
            let totalCount = 0; let totalPrice = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 p-8">
                        <p class="text-center text-xs font-semibold text-gray-500">장바구니가 비어 있습니다.</p>
                    </div>`;
                btnCheckout.disabled = true;
                btnCheckout.className = "w-full py-3 rounded-xl text-base font-black flex justify-center items-center gap-2 transition-all bg-gray-200 text-gray-400 cursor-not-allowed";
            } else {
                cart.forEach(cartItem => {
                    totalCount += cartItem.quantity;
                    totalPrice += cartItem.item.price * cartItem.quantity;
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center bg-white p-3 rounded-xl border border-gray-200/60 shadow-sm";
                    row.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">${cartItem.item.icon}</span>
                            <div>
                                <div class="font-bold text-gray-800 text-xs">${cartItem.item.name}</div>
                                <div class="text-red-600 text-xs font-semibold">${(cartItem.item.price * cartItem.quantity).toLocaleString()}원</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-lg">
                            <button onclick="changeCartQty(${cartItem.item.id}, -1)" class="p-1 text-gray-500 font-bold">-</button>
                            <span class="font-bold text-xs w-4 text-center">${cartItem.quantity}</span>
                            <button onclick="changeCartQty(${cartItem.item.id}, 1)" class="p-1 text-gray-500 font-bold">+</button>
                        </div>`;
                    container.appendChild(row);
                });
                btnCheckout.disabled = false;
                btnCheckout.className = "w-full py-3 rounded-xl text-base font-black flex justify-center items-center gap-2 transition-all bg-red-600 text-white hover:bg-red-700 shadow-lg cursor-pointer";
            }
            totalText.innerText = totalPrice.toLocaleString();
            badge.innerText = `${totalCount}개`;
        }

        function addManyToCart(item, qty) {
            const exist = cart.find(c => c.item.id === item.id);
            if (exist) { exist.quantity += qty; } else { cart.push({ item, quantity: qty }); }
            renderCart();
        }

        function subtractFromCart(item, qty) {
            const exist = cart.find(c => c.item.id === item.id);
            if (exist) {
                exist.quantity -= qty;
                if (exist.quantity <= 0) cart = cart.filter(c => c.item.id !== item.id);
            }
            renderCart();
        }

        function changeCartQty(id, delta) {
            const exist = cart.find(c => c.item.id === id);
            if (exist) {
                exist.quantity += delta;
                if (exist.quantity <= 0) cart = cart.filter(c => c.item.id !== id);
            }
            renderCart();
        }

        function clearCart() { cart = []; renderCart(); speakFeedback("장바구니를 비웠습니다."); }

        function filterCategory(cat) {
            activeCategory = cat;
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => {
                tab.className = tab.innerText === cat 
                    ? "category-tab px-6 py-2.5 rounded-xl font-bold text-base bg-red-600 text-white"
                    : "category-tab px-6 py-2.5 rounded-xl font-bold text-base bg-white text-gray-600 hover:bg-gray-100";
            });
            renderMenu();
        }

        function executeCheckout() {
            if (cart.length === 0) return;
            shouldRestartRecognition = false;
            if (recognition) recognition.stop();

            const orderNum = Math.floor(Math.random() * 900) + 100;
            const dateStr = new Date().toLocaleString('ko-KR');
            const total = cart.reduce((sum, c) => sum + (c.item.price * c.quantity), 0);

            const newOrder = {
                id: Date.now().toString(),
                orderNumber: orderNum,
                date: dateStr,
                items: cart.map(c => ({ name: c.item.name, icon: c.item.icon, quantity: c.quantity })),
                totalPrice: total,
                status: '대기중'
            };
            orders.unshift(newOrder);
            updateKitchenBadge();

            document.getElementById('receipt-number').innerText = `대기번호: ${orderNum}번`;
            document.getElementById('receipt-date').innerText = dateStr;
            document.getElementById('receipt-total').innerText = `${total.toLocaleString()}원`;
            const rItems = document.getElementById('receipt-items');
            rItems.innerHTML = '';
            cart.forEach(c => {
                rItems.innerHTML += `<div class="flex justify-between"><span>${c.item.icon} ${c.item.name} x ${c.quantity}</span><span>${(c.item.price * c.quantity).toLocaleString()}원</span></div>`;
            });

            document.getElementById('receipt-modal').classList.remove('hidden');
            cart = []; renderCart();
            speakFeedback(`결제가 완료되었습니다. 대기번호는 ${orderNum}번입니다. 감사합니다.`);
        }

        function closeReceipt() { document.getElementById('receipt-modal').classList.add('hidden'); }

        // AI 답변 컴포넌트 제어 유틸리티
        function showVoiceArea(show) {
            const area = document.getElementById('voice-feedback-area');
            if (show) area.classList.remove('hidden'); else area.classList.add('hidden');
        }

        function setTranscriptText(text) {
            const row = document.getElementById('transcript-row');
            const span = document.getElementById('transcript-text');
            if (text) { row.classList.remove('hidden'); span.innerText = text; } else { row.classList.add('hidden'); }
        }

        function showAiResponse(msg) {
            const row = document.getElementById('feedback-row');
            const span = document.getElementById('feedback-text');
            showVoiceArea(true);
            row.classList.remove('hidden');
            span.innerText = msg;
        }

        function setAppMode(mode) {
            appMode = mode;
            const viewKiosk = document.getElementById('kiosk-view');
            const sidebarCart = document.getElementById('sidebar-cart');
            const viewKitchen = document.getElementById('kitchen-view');
            
            // 버튼 토글 디자인 클래스 스왑 생략 (간결화)
            if (mode === 'kiosk') {
                viewKiosk.classList.remove('hidden'); sidebarCart.classList.remove('hidden'); viewKitchen.classList.add('hidden');
            } else {
                viewKiosk.classList.add('hidden'); sidebarCart.classList.add('hidden'); viewKitchen.classList.remove('hidden');
                renderKitchen();
            }
        }

        function renderKitchen() {
            const container = document.getElementById('kitchen-orders-container');
            container.innerHTML = '';
            if (orders.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-2xl text-center text-gray-400">대기 주문 없음</div>`;
                return;
            }
            orders.forEach(o => {
                container.innerHTML += `<div class="bg-white p-4 rounded-xl border mb-2"><b>${o.orderNumber}번 주문</b> (${o.status})</div>`;
            });
        }

        function updateKitchenBadge() {
            const badge = document.getElementById('kitchen-count');
            if (orders.length > 0) { badge.innerText = orders.length; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
        }

        window.onload = () => { renderMenu(); renderCart(); };
    </script>
</body>
</html>
