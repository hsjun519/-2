<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음성 인식 받아쓰기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 500px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.recording {
            background-color: #dc3545;
        }
        button.recording:hover {
            background-color: #bd2130;
        }
        #result {
            border: 1px solid #ddd;
            padding: 15px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            background: #fafafa;
            border-radius: 6px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 16px;
        }
        .placeholder {
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ 음성 인식 받아쓰기</h2>
    <button id="speech-btn">음성 인식 시작</button>
    <div id="result" class="placeholder">여기에 말한 내용이 표시됩니다.</div>
</div>

<script>
    const speechBtn = document.getElementById('speech-btn');
    const resultDiv = document.getElementById('result');

    // 브라우저 지원 여부 확인 (Chrome, Edge 등에서 지원)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        resultDiv.innerText = "이 브라우저는 음성 인식을 지원하지 않습니다. 크롬(Chrome)이나 엣지(Edge) 브라우저를 이용해 주세요.";
        speechBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        
        // 설정
        recognition.lang = 'ko-KR';        // 인식할 언어 (한국어)
        recognition.continuous = true;    // 말하기를 멈춰도 계속 인식하도록 설정
        recognition.interimResults = true; // 실시간으로 인식 중인 글자 보여주기

        let isListening = false;

        // 버튼 클릭 이벤트
        speechBtn.addEventListener('click', () => {
            if (!isListening) {
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        // 음성 인식 시작 시
        recognition.onstart = () => {
            isListening = true;
            speechBtn.innerText = "🛑 음성 인식 중지";
            speechBtn.classList.add('recording');
            if (resultDiv.classList.contains('placeholder')) {
                resultDiv.innerText = '';
                resultDiv.classList.remove('placeholder');
            }
        };

        // 음성 인식 종료 시
        recognition.onend = () => {
            isListening = false;
            speechBtn.innerText = "🎙️ 음성 인식 시작";
            speechBtn.classList.remove('recording');
            if (resultDiv.innerText.trim() === '') {
                resultDiv.innerText = '여기에 말한 내용이 표시됩니다.';
                resultDiv.classList.add('placeholder');
            }
        };

        // 음성 인식 결과가 들어올 때
        recognition.onresult = (event) => {
            let combinedText = '';
            
            // 처음부터 현재까지 인식된 모든 결과를 합칩니다.
            for (let i = 0; i < event.results.length; i++) {
                combinedText += event.results[i][0].transcript + ' ';
            }
            
            resultDiv.innerText = combinedText;
            // 스크롤을 항상 아래로 유지
            resultDiv.scrollTop = resultDiv.scrollHeight;
        };

        // 에러 발생 시
        recognition.onerror = (event) => {
            console.error("음성 인식 에러:", event.error);
            if (event.error === 'not-allowed') {
                alert("마이크 권한이 거부되었습니다. 주소창 옆 마이크 아이콘을 눌러 권한을 허용해 주세요.");
            }
        };
    }
</script>

</body>
</html>
