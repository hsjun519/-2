<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>음성 인식 받아쓰기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 500px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button.recording {
            background-color: #dc3545;
        }
        #result {
            border: 1px solid #ddd;
            padding: 15px;
            min-height: 150px;
            text-align: left;
            background: #fafafa;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        /* 에러 메시지 스타일 */
        #error-msg {
            color: #dc3545;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ 음성 인식 받아쓰기</h2>
    <button id="speech-btn">음성 인식 시작</button>
    <div id="result">여기에 말한 내용이 표시됩니다.</div>
    <div id="error-msg"></div> <!-- 에러가 나면 여기에 뜹니다 -->
</div>

<script>
    const speechBtn = document.getElementById('speech-btn');
    const resultDiv = document.getElementById('result');
    const errorMsg = document.getElementById('error-msg');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        resultDiv.innerText = "이 브라우저는 음성 인식을 지원하지 않습니다.";
        speechBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ko-KR';
        recognition.continuous = true;
        recognition.interimResults = true;

        let isListening = false;

        speechBtn.addEventListener('click', () => {
            if (!isListening) {
                errorMsg.innerText = ""; // 에러 초기화
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        recognition.onstart = () => {
            isListening = true;
            speechBtn.innerText = "🛑 음성 인식 중지";
            speechBtn.classList.add('recording');
        };

        recognition.onend = () => {
            isListening = false;
            speechBtn.innerText = "🎙️ 음성 인식 시작";
            speechBtn.classList.remove('recording');
        };

        recognition.onresult = (event) => {
            let combinedText = '';
            for (let i = 0; i < event.results.length; i++) {
                combinedText += event.results[i][0].transcript + ' ';
            }
            resultDiv.innerText = combinedText;
        };

        // 에러가 나면 바로 화면에 표시해 줍니다.
        recognition.onerror = (event) => {
            console.error(event.error);
            if (event.error === 'not-allowed') {
                errorMsg.innerText = "❌ 에러: 마이크 권한이 차단되었거나, 보안 환경(HTTPS/Localhost)이 아닙니다.";
            } else if (event.error === 'no-speech') {
                errorMsg.innerText = "❌ 에러: 말소리가 들리지 않아 종료되었습니다.";
            } else {
                errorMsg.innerText = `❌ 에러 발생: ${event.error} (서버 환경에서 실행해야 할 수 있습니다.)`;
            }
        };
    }
</script>

</body>
</html>
